<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p5.js 文字重複排列</title>
  <!-- 引入 p5.js 函式庫 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <!-- 引入 Google Fonts 恐怖字體 (Nosifer) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nosifer&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* 防止出現捲軸 */
      background-color: #222;
    }
  </style>
</head>
<body>

<script>
  let inputElement; // 用來儲存輸入框物件
  let baseTextSize = 64; //設定字體大小
  let sizeSlider; // 用來儲存滑桿物件

  function setup() {
    // 1. 建立全螢幕畫布
    createCanvas(windowWidth, windowHeight);
    
    // 2. 建立 DOM 輸入框 (createInput)
    inputElement = createInput('HELLO'); // 預設文字
    
    // 3. 設定輸入框的樣式與位置
    inputElement.position(20, 20); // 放置在左上角
    inputElement.size(200);
    inputElement.style('font-size', '16px');
    inputElement.style('padding', '5px');
    inputElement.style('border', 'none');
    inputElement.style('border-radius', '4px');
    inputElement.style('background', 'rgba(255, 255, 255, 0.8)');
    inputElement.style('z-index', '1000'); // 確保輸入框在最上層

    // 4. 建立文字大小滑桿 (最小值, 最大值, 預設值)
    sizeSlider = createSlider(15, 80, baseTextSize);
    sizeSlider.position(20, 60); // 設定位置在輸入框下方
    sizeSlider.size(200); // 設定寬度
    sizeSlider.style('z-index', '1000');
    sizeSlider.style('accent-color', '#5D4037'); // 改為深棕色
  }

  function draw() {
    background(30); // 深色背景
    
    // 增加白色噴漆效果 (隨機繪製白點)
    stroke(255); // 改為全白，增加對比
    strokeWeight(2); // 讓點變大
    for (let i = 0; i < 1000; i++) { // 大幅增加點的數量
      point(random(width), random(height));
    }

    if (!inputElement) return; // 確保輸入框已建立，避免錯誤

    // 取得使用者輸入的內容
    let txt = inputElement.value();
    
    // 如果沒有輸入內容，給予一個預設值，避免畫面空白或無窮迴圈錯誤
    if (txt.length === 0) {
      txt = "TYPE SOMETHING";
    }

    // 設定文字屬性
    textFont('Nosifer'); // 套用恐怖字體
    textSize(sizeSlider.value()); // 根據滑桿數值設定文字大小
    textAlign(LEFT, CENTER); // 水平靠左，垂直置中
    fill(255, 0, 0); // 紅色文字
    noStroke();

    // 計算文字寬度與間距
    // textWidth() 是 p5.js 用來計算當前字體設定下，字串佔用像素寬度的函式
    let w = textWidth(txt); 
    let spacing = 20; // 文字之間的額外間距
    let totalUnitWidth = w + spacing; // 一個單元(文字+間距)的總寬度

    // 避免 totalUnitWidth 為 0 導致無窮迴圈 (雖然上面有檢查空字串，但為了強健性)
    if (totalUnitWidth < 1) totalUnitWidth = 10;

    let x = 0; // 起始 x 座標

    // 利用外部迴圈，重複排列文字區塊直到填滿畫面
    while (x < width) {
      let charX = x; // 當前字元區塊的起始 x 座標

      // 利用內部迴圈，單獨繪製每個字元以產生晃動效果
      for (let i = 0; i < txt.length; i++) {
        const char = txt.charAt(i);
        const shakeY = random(-3, 3); // 改為垂直晃動，並稍微增加幅度

        // 在計算後的位置加上隨機偏移來繪製單一字元
        text(char, charX, height / 2 + shakeY);
        charX += textWidth(char); // 移動到下一個字元的位置
      }
      
      x += totalUnitWidth; // 更新 x 座標，準備畫下一個文字區塊
    }
  }

  // 當視窗大小改變時，重新調整畫布大小
  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }
</script>

</body>
</html>
